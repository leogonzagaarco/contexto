: compact, leftPanelStyle,\n      leftRailVisible: isExam && !s.leftOpen && !compact,\n      rightRailVisible: isBlock && !s.rightOpen && !compact,\n      menuItem1: this.menuItemObj(1), menuItem6: this.menuItemObj(6),\n      menuA: [2,3,4,5].map(n => this.menuItemObj(n)), menuB: [7,8,9].map(n => this.menuItemObj(n)),\n\n      rightVisible: isBlock && s.rightOpen && !compact,\n      showInlineContext: isBlock && compact,\n      drawerTitle, drawerSubtitle: \"Todas as questões deste bloco utilizam o conteúdo abaixo.\",\n      drawerIsImage: v === \"blockA\", drawerIsAudio: v === \"blockB\",\n      drawerNums: (v === \"blockB\" ? [7,8,9] : [2,3,4,5]).map(n => this.drawerNumObj(n)),\n      contextImage: this.contextImageEl(220), contextImageLarge: this.contextImageEl(\"auto\"),\n      audioPlayer: this.audioPlayerEl(),\n\n      centerCards: cardIds.map(id => this.buildCard(id)),\n\n      footerStyle, showAnterior: v !== \"q1\" && isExam,\n      timerText: s.timerHidden ? \"--:--\" : this.fmt(s.timeLeft),\n      timerHidden: s.timerHidden, timerShown: !s.timerHidden,\n      answeredCount,\n      progressFillStyle: { width: (answeredCount / 9 * 100) + \"%\", height: \"100%\", background: \"#117DD4\", borderRadius: 99, transition: \"width .3s ease\" },\n\n      reviewChips: [1,2,3,4,5,6,7,8,9].map(n => this.reviewChipObj(n)),\n      imageModal: s.imageModal, success: s.success\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
